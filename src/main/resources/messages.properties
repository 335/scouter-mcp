# Default (English) user-facing messages for Scouter MCP.
# Korean overrides live in messages_ko.properties.
# Only dynamic, user-facing output is localized (tool error messages, result hints, notes).
# Structured stderr logs and static schema/tool descriptions remain English.

error.from_after_to=from must be earlier than to
error.window_too_long=Query window is too long (max {0} hours)
error.unfiltered_window=Without a service or objHash filter, only up to {0} minutes can be queried. Add a filter or shorten the period
error.counter_obj_required=Either objHashes or objType is required
error.counter_window_too_long=Counter query window is too long (max {0} hours)

hint.search_scan_cap=Scan cap ({0}) reached; only partial results returned. Add a service or objHash filter, or shorten the period
hint.search_limit=limit reached; more results may exist. Increase limit or adjust the period/filters
hint.search_empty=No results. Widen the period or filters
hint.counter_empty=No results. Widen the period (from/to) or check the counter name/objType
hint.list_counters_empty=No counter definitions found for this objType. Check the objType name
hint.gxid_empty=No results. Check the gxid/date

note.counter_obj_truncated=Queried only the top {0} of {1} objType instances. Specify an objHash for exact results
