# Default (English) user-facing messages for Scouter MCP.
# Korean overrides live in messages_ko.properties.
# Only dynamic, user-facing output is localized (tool error messages, result hints, notes).
# Structured stderr logs and static schema/tool descriptions remain English.

error.from_after_to=from must be earlier than to
error.window_too_long=Query window is too long (max {0} hours)
error.unfiltered_window=Without a service or objHash filter, only up to {0} minutes can be queried. Add a filter or shorten the period
error.counter_obj_required=One of objNameLike, objHashes, or objType is required
error.target_not_found=No object matches "{0}". Check the candidates hint (or call list_objects) and retry with a fragment of an actual objName
error.counter_window_too_long=Counter query window is too long (max {0} hours)
error.too_many_passes=This query fans out to {0} collector round-trips (instances x days), above the cap of {1}. Narrow the time window or target fewer instances

hint.search_scan_cap=Scan cap ({0}) reached; only partial results returned. Add a service or objHash filter, or shorten the period
hint.low_selectivity=Only {0} of {1} scanned rows passed the client-side filters (minElapsedMs/onlyError) - the collector still streamed all of them. Add a server-side filter (service/objNameLike) or use get_service_summary / get_summary for "which is slow/erroring" questions
hint.search_limit=limit reached; more results may exist. Increase limit or adjust the period/filters
hint.search_empty=No results. Widen the period step by step (now-1h -> now-6h -> now-24h; keep a filter for windows over 5 minutes), or relax filters. To target an app, use objNameLike
hint.search_service_is_app=''{0}'' matches an application objName, but the service filter matches request URLs, not app names. Retry with objNameLike=''{0}'' (and put a URL fragment in service if needed)
hint.search_service_candidates=The service pattern matched nothing, but similar real service names were found in this window (see serviceCandidates). Retry with one of them — server-side matching is case-sensitive, so use the exact name or a fragment of it
hint.counter_empty=No results. Widen the period (from/to) or check the counter name/objType
hint.list_counters_empty=No counter definitions found for this objType. Check the objType name
hint.gxid_empty=No results. Check the gxid/date
hint.summary_scan_cap=Scan cap ({0}) reached; the aggregate is partial. Add a filter (service/objHash/login/ip) or shorten the period
hint.alerts_empty=No alerts. Widen the period or relax the level/object/keyword filters
hint.active_empty=No active services right now. Check objType/objHash or try again
hint.threads_empty=No threads returned. The agent may be down or not a Java agent - check list_objects (alive) first

note.counter_obj_truncated=Queried only the top {0} of {1} objType instances. Specify an objHash for exact results
