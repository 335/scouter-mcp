# Korean user-facing messages. (Java 9+ reads .properties as UTF-8.)

error.from_after_to=from은 to보다 앞서야 합니다
error.window_too_long=조회 기간이 너무 깁니다(최대 {0}시간)
error.unfiltered_window=service 또는 objHash 필터 없이는 {0}분 이내만 조회할 수 있습니다. 필터를 추가하거나 기간을 줄이세요
error.counter_obj_required=objNameLike, objHashes, objType 중 하나는 필수입니다
error.target_not_found="{0}"와 일치하는 오브젝트가 없습니다. candidates 힌트(또는 list_objects)를 확인하고 실제 objName의 일부로 다시 시도하세요
error.counter_window_too_long=카운터 조회 기간이 너무 깁니다(최대 {0}시간)
error.too_many_passes=이 조회는 collector 왕복 {0}회(인스턴스 x 일자)로 퍼져 상한 {1}회를 초과합니다. 시간 범위를 좁히거나 대상 인스턴스를 줄이세요

hint.search_scan_cap=스캔 상한({0}) 도달로 일부만 반환됨. service 또는 objHash 필터를 추가하거나 기간을 좁히세요
hint.low_selectivity=스캔한 {1}건 중 {0}건만 클라이언트측 필터(minElapsedMs/onlyError)를 통과했습니다(client-side) - collector는 전부 전송했습니다. 서버측 필터(service/objNameLike)를 추가하거나, "뭐가 느린가/에러인가"류 질문에는 get_service_summary / get_summary를 쓰세요
hint.search_limit=limit 도달. 더 많은 결과가 있을 수 있으니 limit를 늘리거나 기간/필터를 조정하세요
hint.search_empty=결과가 없습니다. 기간을 단계적으로 넓히거나(now-1h -> now-6h -> now-24h, 5분 초과는 필터 유지) 필터를 완화하세요. 앱을 지정하려면 objNameLike를 사용하세요
hint.search_service_is_app=''{0}''은(는) 애플리케이션 objName과 일치합니다. service 필터는 요청 URL에 매칭되고 앱 이름과는 매칭되지 않습니다. objNameLike=''{0}''으로 다시 시도하세요(URL 조각이 필요하면 service에 넣으세요)
hint.search_service_candidates=service 패턴에 매칭된 것이 없지만, 같은 구간에서 유사한 실제 서비스명을 찾았습니다(serviceCandidates 참조). 그중 하나로 다시 시도하세요 — 서버측 매칭은 대소문자를 구분하므로 정확한 이름 또는 그 일부를 사용하세요
hint.counter_empty=결과가 없습니다. 조회 구간(from/to)을 넓히거나 counter 이름/objType을 확인하세요
hint.list_counters_empty=해당 objType의 카운터 정의를 찾지 못했습니다. objType 이름을 확인하세요
hint.gxid_empty=결과가 없습니다. gxid/date를 확인하세요
hint.summary_scan_cap=스캔 상한({0}) 도달로 집계가 일부만 반영됨. 필터(service/objHash/login/ip)를 추가하거나 기간을 좁히세요
hint.alerts_empty=알림이 없습니다. 기간을 넓히거나 level/object/키워드 필터를 완화하세요
hint.active_empty=현재 활성 서비스가 없습니다. objType/objHash를 확인하거나 다시 시도하세요
hint.threads_empty=스레드가 조회되지 않았습니다. 에이전트가 죽었거나 Java 에이전트가 아닐 수 있습니다 - 먼저 list_objects로 alive 여부를 확인하세요
error.thread_detail_empty=스레드 상세가 조회되지 않았습니다. 에이전트가 죽었거나 txid/스레드가 이미 사라졌습니다
hint.thread_detail_stale=트랜잭션이 이미 종료되었습니다(스레드 상세는 실시간 스냅샷). get_active_services나 list_threads에서 새 txid를 받아 즉시 다시 호출하세요

note.counter_obj_truncated=objType 인스턴스 {1}개 중 상위 {0}개만 조회했습니다. 정확한 결과는 objHash를 지정하세요
